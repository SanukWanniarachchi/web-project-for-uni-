<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rivers in Sri Lanka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Rivers of Sri Lanka</h1>
    </header>

    <main>
        <h2>Beautiful Rivers in Sri Lanka</h2>

        <p>Sri Lanka has beautiful rivers like Mahaweli, Kelani, and Kalu River.</p>

        <section>
            <h3>Major Rivers</h3>

            <table>
                <tr>
                    <th>River</th>
                    <th>Length</th>

                </tr>
                <tr>
                    <td>Mahaweli</td>
                    <td>335 km</td>
                    <td>
                        <img src="mahaweli.jpg" alt="Mahaweli River">
                    </td>
                </tr>
                <tr>
                    <td>Kelani</td>
                    <td>145 km</td>
                    <td>
                        <img src="kelani.jpg" alt="Kelani River">
                    </td>
                </tr>
                <tr>
                    <td>Kalu River</td>
                    <td>129 km</td>
                    <td>
                        <img src="kalu.jpg" alt="Kalu River">
                    </td>
                </tr>
            </table>
        </section>

</html>
